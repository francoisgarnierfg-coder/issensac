name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web (PWA)
        run: npx expo export --platform web

      - name: Add PWA manifest and icons
        run: |
          cp assets/icon-180.png dist/icon-180.png
          cp assets/icon.png dist/icon-512.png
          cp manifest.json dist/manifest.json
          sed -i 's|</head>|<link rel="manifest" href="/issensac/manifest.json"><link rel="apple-touch-icon" href="/issensac/icon-180.png"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="Issensac"></head>|' dist/index.html

      - name: Set up service worker
        run: |
          SHA=$(git rev-parse --short HEAD)
          sed "s/BUILD_VERSION/$SHA/" sw.js > dist/sw.js

      - name: Inject SW auto-update into HTML
        run: |
          python3 - << 'EOF'
          with open('dist/index.html', 'r') as f:
              html = f.read()
          script = (
              '<script>'
              'if("serviceWorker"in navigator){'
              'var refreshing=false;'
              'navigator.serviceWorker.addEventListener("controllerchange",function(){'
              'if(refreshing)return;refreshing=true;window.location.reload();'
              '});'
              'navigator.serviceWorker.register("/issensac/sw.js").then(function(reg){'
              'document.addEventListener("visibilitychange",function(){'
              'if(document.visibilityState==="visible")reg.update();'
              '});'
              'setInterval(function(){reg.update();},5*60*1000);'
              '});'
              '}'
              '</script>'
          )
          html = html.replace('</body>', script + '</body>')
          with open('dist/index.html', 'w') as f:
              f.write(html)
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
